<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Signal Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #08081a;
      --surface:   #0f0f22;
      --surface2:  #161630;
      --border:    rgba(255,255,255,0.07);
      --border2:   rgba(255,255,255,0.12);
      --cyan:      #22d3ee;
      --green:     #26de81;
      --green-glow:rgba(38,222,129,0.3);
      --red:       #ff4757;
      --red-glow:  rgba(255,71,87,0.3);
      --text:      #eef2ff;
      --muted:     #556080;
      --muted2:    #8896b3;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased; overscroll-behavior: none; user-select: none;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background:
        radial-gradient(ellipse at 15% 15%, rgba(99,102,241,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(34,211,238,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 100%, rgba(38,222,129,0.06) 0%, transparent 50%);
      pointer-events:none; z-index:0;
    }
    #root {
      position:relative; z-index:1; display:flex; flex-direction:column;
      height:100vh; height:100dvh; overflow:hidden;
    }

    /* ─── Header ─────────────────────────── */
    .hdr {
      flex-shrink:0;
      background:rgba(15,15,34,0.9);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
    }
    .hdr-row1 { display:none; }
    .hdr-btn {
      width:34px; height:34px; border-radius:9px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; cursor:pointer;
    }
    .hdr-logo { display:flex; align-items:center; gap:7px; }
    .hdr-logo-icon {
      width:26px; height:26px; background:linear-gradient(135deg,#6366f1,#22d3ee);
      border-radius:7px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 12px rgba(99,102,241,0.4);
    }
    .hdr-logo-text {
      font-size:14px; font-weight:700; letter-spacing:0.3px;
      background:linear-gradient(90deg,#fff,#a5b4fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* Ticker row */
    .hdr-ticker {
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 16px 10px; gap:10px;
    }
    .ticker-left { display:flex; align-items:center; gap:8px; }
    .ticker-pair { font-size:13px; font-weight:700; color:var(--text); }
    .ticker-price {
      font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; color:var(--text);
    }
    .ticker-change {
      font-size:11px; font-weight:700; font-variant-numeric:tabular-nums;
      padding:2px 7px; border-radius:5px;
    }
    .ticker-change.up   { color:var(--green); background:rgba(38,222,129,0.12); }
    .ticker-change.down { color:var(--red);   background:rgba(255,71,87,0.12);  }
    .ticker-dot {
      width:6px; height:6px; border-radius:50%; flex-shrink:0;
      animation:pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

    /* ─── Sparkline strip ─────────────────── */
    .spark-strip {
      flex-shrink:0; height:52px; position:relative;
      padding:0; overflow:hidden;
      border-bottom:1px solid var(--border);
      background:rgba(8,8,26,0.6);
    }
    .spark-strip svg { display:block; width:100%; height:100%; }

    /* ─── Main ───────────────────────────── */
    .main {
      flex:1; min-height:0; display:flex; align-items:center; justify-content:center;
      padding:12px 16px; overflow-y:auto;
    }

    /* ─── IDLE VIEW ──────────────────────── */
    .idle { display:flex; flex-direction:column; align-items:center; gap:14px; text-align:center; width:100%; }
    .idle-hex { width:80px; height:80px; position:relative; display:flex; align-items:center; justify-content:center; }
    .idle-hex svg.bg { position:absolute; inset:0; width:100%; height:100%; }
    .idle-hex-inner { position:relative; z-index:1; display:flex; align-items:center; justify-content:center; }
    .idle-title { font-size:17px; font-weight:700; color:var(--text); }
    .idle-sub { font-size:12px; color:var(--muted2); max-width:220px; line-height:1.6; }
    .badges { display:flex; gap:7px; }
    .badge {
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:9px 5px;
      background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:11px;
      font-size:10px; color:var(--muted2); font-weight:500;
    }
    .badge-val { font-size:11px; font-weight:700; color:var(--text); }

    /* ─── ANALYSIS VIEW ──────────────────── */
    .analysis { display:flex; flex-direction:column; align-items:center; width:100%; }
    .radar-wrap {
      position:relative; width:110px; height:110px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:12px; flex-shrink:0;
    }
    .radar-outer { position:absolute; inset:0; border-radius:50%; border:2.5px solid rgba(34,211,238,0.15); }
    .radar-inner { position:absolute; inset:10px; border-radius:50%; border:1.5px solid rgba(34,211,238,0.08); }
    .radar-spin {
      position:absolute; inset:0; border-radius:50%;
      border:2.5px solid transparent; border-top-color:var(--cyan); border-right-color:rgba(34,211,238,0.5);
      animation:rSpin 1.2s linear infinite; box-shadow:0 0 14px rgba(34,211,238,0.22);
    }
    @keyframes rSpin { to { transform:rotate(360deg); } }
    .radar-dot {
      position:absolute; width:7px; height:7px; background:var(--cyan); border-radius:50%;
      top:-1px; left:50%; transform:translateX(-50%);
      box-shadow:0 0 7px var(--cyan); animation:rSpin 1.2s linear infinite;
    }
    .radar-count { font-size:20px; font-weight:800; font-variant-numeric:tabular-nums; color:var(--text); z-index:1; line-height:1; }
    .radar-count-sub { font-size:9px; color:var(--muted2); margin-top:2px; z-index:1; }
    .radar-center { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; }
    .analysis-status { font-size:12px; font-weight:600; color:var(--muted2); margin-bottom:12px; min-height:18px; }
    .inds { width:100%; display:flex; flex-direction:column; gap:7px; }
    .ind-row { display:flex; align-items:center; gap:7px; animation:fadeUp 0.28s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:translateY(0);} }
    .ind-icon { flex-shrink:0; width:18px; height:18px; display:flex; align-items:center; justify-content:center; }
    .ind-icon.bull { color:var(--green); } .ind-icon.bear { color:var(--red); }
    .ind-name { font-size:10px; color:var(--muted2); width:82px; flex-shrink:0; }
    .ind-bar-bg { flex:1; height:3px; background:rgba(255,255,255,0.06); border-radius:2px; overflow:hidden; }
    .ind-bar { height:100%; border-radius:2px; transition:width 0.55s cubic-bezier(0.4,0,0.2,1); }
    .ind-bar.bull { background:linear-gradient(90deg,#15803d,#26de81); }
    .ind-bar.bear { background:linear-gradient(90deg,#b91c1c,#ff4757); }
    .ind-val { font-size:10px; font-weight:700; width:68px; text-align:right; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ind-val.bull { color:var(--green); } .ind-val.bear { color:var(--red); }

    /* ─── SIGNAL VIEW ────────────────────── */
    .sig-card {
      width:100%; border-radius:20px; padding:20px 18px 18px;
      display:flex; flex-direction:column; align-items:center;
      animation:sigIn 0.45s cubic-bezier(0.34,1.56,0.64,1); position:relative; overflow:hidden;
    }
    .sig-card.buy {
      background:linear-gradient(160deg,rgba(38,222,129,0.12) 0%,rgba(38,222,129,0.04) 100%);
      box-shadow:0 0 55px var(--green-glow),inset 0 1px 0 rgba(38,222,129,0.3);
      border:1px solid rgba(38,222,129,0.25);
    }
    .sig-card.sell {
      background:linear-gradient(160deg,rgba(255,71,87,0.12) 0%,rgba(255,71,87,0.04) 100%);
      box-shadow:0 0 55px var(--red-glow),inset 0 1px 0 rgba(255,71,87,0.3);
      border:1px solid rgba(255,71,87,0.25);
    }
    @keyframes sigIn { from{opacity:0;transform:scale(0.88) translateY(10px);} to{opacity:1;transform:scale(1) translateY(0);} }
    .sig-circle {
      width:72px; height:72px; border-radius:50%;
      display:flex; align-items:center; justify-content:center; margin-bottom:10px;
      animation:circleIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
    }
    @keyframes circleIn { from{transform:scale(0.5);opacity:0;} to{transform:scale(1);opacity:1;} }
    .sig-circle.buy  { background:linear-gradient(135deg,#26de81,#0fa854); box-shadow:0 0 28px rgba(38,222,129,0.55),0 0 60px rgba(38,222,129,0.2); }
    .sig-circle.sell { background:linear-gradient(135deg,#ff4757,#c0303e); box-shadow:0 0 28px rgba(255,71,87,0.55),0 0 60px rgba(255,71,87,0.2); }
    .sig-dir { font-size:25px; font-weight:900; letter-spacing:2px; margin-bottom:12px; }
    .sig-dir.buy  { color:var(--green); } .sig-dir.sell { color:var(--red); }
    .sig-divider { width:100%; height:1px; background:var(--border); margin-bottom:12px; }
    .sig-meta { font-size:12px; color:var(--muted2); margin-bottom:10px; }
    .sig-acc-block { margin-bottom:12px; text-align:center; }
    .sig-acc {
      font-size:42px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1;
      background:linear-gradient(135deg,#fff,#a5b4fc);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .sig-acc-lbl { font-size:9px; color:var(--muted); margin-top:2px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600; }

    /* bottom row: payout + ring timer */
    .sig-bottom { display:flex; align-items:center; justify-content:space-between; width:100%; margin-bottom:14px; gap:10px; }
    .sig-payout {
      flex:1; padding:10px 12px; border-radius:12px;
      background:rgba(99,102,241,0.12); border:1px solid rgba(99,102,241,0.25);
      display:flex; flex-direction:column; align-items:center; gap:2px;
      font-size:10px; color:var(--muted2); font-weight:500;
    }
    .sig-payout-val { font-size:20px; font-weight:800; color:#a5b4fc; font-variant-numeric:tabular-nums; }
    .sig-ring-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
    .sig-ring-lbl { font-size:9px; color:var(--muted); font-weight:600; letter-spacing:0.8px; text-transform:uppercase; }

    .new-sig-btn {
      width:100%; padding:11px;
      background:rgba(255,255,255,0.06); border:1px solid var(--border2); border-radius:12px;
      color:var(--muted2); font-family:inherit; font-size:13px; font-weight:600;
      cursor:pointer; transition:all 0.15s;
    }
    .new-sig-btn:active { background:rgba(255,255,255,0.1); }

    /* ─── Controls ───────────────────────── */
    .controls {
      flex-shrink:0; background:rgba(15,15,34,0.92);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-top:1px solid var(--border); padding:10px 14px;
      padding-bottom:max(10px,env(safe-area-inset-bottom));
      display:flex; flex-direction:column; gap:8px;
    }

    /* Pair button */
    .pair-btn {
      width:100%; display:flex; align-items:center; justify-content:space-between; padding:10px 13px;
      background:rgba(255,255,255,0.04); backdrop-filter:blur(12px);
      border:1px solid var(--border2); border-radius:12px; cursor:pointer; transition:all 0.15s;
    }
    .pair-btn:active { background:rgba(255,255,255,0.07); }
    .pair-btn-left { display:flex; align-items:center; gap:9px; }
    .pair-btn-name { font-size:14px; font-weight:600; color:var(--text); }
    .pair-btn-tag {
      font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; margin-left:5px;
      background:rgba(34,211,238,0.12); color:var(--cyan); border:1px solid rgba(34,211,238,0.25);
    }

    /* Pair sheet */
    .pair-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.55);
      backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
      z-index:100; animation:olFadeIn 0.2s ease;
    }
    @keyframes olFadeIn { from{opacity:0;} to{opacity:1;} }
    .pair-sheet {
      position:fixed; bottom:0; left:0; right:0;
      background:#0d0d24; border-radius:20px 20px 0 0;
      border-top:1px solid rgba(255,255,255,0.1);
      z-index:101; max-height:75vh; display:flex; flex-direction:column;
      animation:sheetUp 0.28s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes sheetUp { from{transform:translateY(100%);} to{transform:translateY(0);} }
    .pair-sheet-hdr {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 18px 10px; border-bottom:1px solid var(--border); flex-shrink:0;
    }
    .pair-sheet-title { font-size:15px; font-weight:700; color:var(--text); }
    .pair-sheet-close {
      width:28px; height:28px; border-radius:7px;
      background:rgba(255,255,255,0.06); border:1px solid var(--border);
      display:flex; align-items:center; justify-content:center; cursor:pointer; color:var(--muted2);
    }

    /* Search */
    .pair-search-wrap {
      padding:10px 16px 8px; flex-shrink:0; border-bottom:1px solid var(--border);
    }
    .pair-search {
      width:100%; padding:8px 12px 8px 36px; border-radius:9px;
      background:rgba(255,255,255,0.05); border:1px solid var(--border2);
      color:var(--text); font-family:inherit; font-size:13px; font-weight:500;
      outline:none; position:relative;
    }
    .pair-search::placeholder { color:var(--muted); }
    .pair-search-icon { position:relative; }
    .pair-search-icon svg {
      position:absolute; left:12px; top:50%; transform:translateY(-50%);
      pointer-events:none; z-index:1;
    }

    .pair-sheet-body { overflow-y:auto; padding:6px 0 20px; }
    .pair-section-label {
      font-size:10px; font-weight:700; letter-spacing:1.2px; color:var(--muted);
      padding:8px 18px 4px; text-transform:uppercase; display:flex; align-items:center; gap:6px;
    }
    .pair-section-count {
      font-size:10px; font-weight:600; color:var(--muted);
      background:rgba(255,255,255,0.06); border-radius:4px; padding:1px 5px;
    }
    .pair-item {
      display:flex; align-items:center; gap:10px; padding:8px 18px;
      cursor:pointer; transition:background 0.1s;
    }
    .pair-item:active { background:rgba(255,255,255,0.04); }
    .pair-item.active { background:rgba(34,211,238,0.07); }
    .pair-item-name { font-size:13px; font-weight:600; color:var(--text); flex:1; }
    .pair-item-check {
      width:18px; height:18px; border-radius:50%;
      background:var(--cyan); display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .fav-btn {
      background:none; border:none; cursor:pointer; padding:2px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; transition:transform 0.15s;
    }
    .fav-btn:active { transform:scale(0.8); }
    .no-results { text-align:center; padding:24px; font-size:13px; color:var(--muted); }

    /* Timeframe */
    .tf-row { display:flex; gap:5px; }
    .tf-btn {
      flex:1; padding:7px 0;
      background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px;
      color:var(--muted2); font-family:inherit; font-size:12px; font-weight:600;
      cursor:pointer; transition:all 0.15s;
    }
    .tf-btn.active { background:rgba(34,211,238,0.15); border-color:rgba(34,211,238,0.4); color:var(--cyan); }
    .tf-btn:active { transform:scale(0.93); }

    /* Generate button */
    .gen-btn {
      position:relative; overflow:hidden; width:100%;
      display:flex; align-items:center; justify-content:center; gap:8px; padding:13px;
      background:linear-gradient(135deg,#26de81,#12b865);
      border:none; border-radius:12px; color:#fff; font-family:inherit;
      font-size:14px; font-weight:700; cursor:pointer; transition:all 0.15s;
      box-shadow:0 4px 20px rgba(38,222,129,0.3); letter-spacing:0.3px;
    }
    .gen-btn::after {
      content:''; position:absolute; top:0; left:-100%; width:55%; height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.22),transparent);
      animation:shimmer 2.4s ease-in-out infinite;
    }
    @keyframes shimmer { to{left:160%;} }
    .gen-btn:active { transform:scale(0.98); }
    .gen-btn:disabled { background:var(--surface2); box-shadow:none; color:var(--muted); cursor:not-allowed; }
    .gen-btn:disabled::after { display:none; }

    /* Language */
    .lang-row { display:flex; justify-content:center; gap:8px; }
    .lang-btn {
      padding:4px 16px; background:transparent; border:1px solid var(--border); border-radius:20px;
      color:var(--muted); font-family:inherit; font-size:11px; font-weight:700;
      letter-spacing:0.5px; cursor:pointer; transition:all 0.15s;
    }
    .lang-btn.active { border-color:rgba(34,211,238,0.5); color:var(--cyan); background:rgba(34,211,238,0.08); }
  </style>
</head>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

// ── Data ────────────────────────────────────────────────
const PAIRS_OTC = [

  'AUD/CAD':0.88340,'AUD/CHF':0.55820,'NZD/JPY':83.940,'NZD/CHF':0.51760,

function getDecimals(pair) {
  if (/JPY|RUB/.test(pair)) return 3;
  if (/BTC|ETH|XAU/.test(pair)) return 2;
  return 5;
}
function getVolatility(pair) {
  if (/BTC|ETH/.test(pair)) return 0.0007;
  if (/XAU/.test(pair)) return 0.0004;
  if (/JPY|RUB/.test(pair)) return 0.00025;
  return 0.00015;
}

];

  CAD:'ca',CHF:'ch',RUB:'ru',AED:'ae',CNY:'cn',NOK:'no',
};

  ETH:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons@master/32/color/eth.png',
};

const T = {

// ── Sparkline ────────────────────────────────────────────
function Sparkline({data, isUp}) {
  if (!data || data.length < 2) return <div style={{width:'100%',height:'100%'}}/>;
  const W = 400, H = 52;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 0.0001;
  const pts = data.map((v,i) => {
    const x = (i / (data.length - 1)) * W;
    const y = H - ((v - min) / range) * (H - 8) - 4;
    return [x, y];
  });
  const linePath  = 'M ' + pts.map(p => p.join(',')).join(' L ');
  const areaPath  = `M 0,${H} L ${pts.map(p=>p.join(',')).join(' L ')} L ${W},${H} Z`;
  const color     = isUp ? '#26de81' : '#ff4757';
  const gradId    = 'spg';

  return (
    <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{width:'100%',height:'100%',display:'block'}}>
      <defs>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#${gradId})`}/>
      <path d={linePath} fill="none" stroke={color} strokeWidth="1.8" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2.5" fill={color}/>
    </svg>
  );
}

// ── RingTimer ────────────────────────────────────────────
function RingTimer({tfMs, t}) {
  const total = Math.floor(tfMs / 1000);
  const [sec, setSec] = useState(total);
  useEffect(() => {
    const id = setInterval(() => setSec(p => p > 0 ? p - 1 : 0), 1000);
    return () => clearInterval(id);
  }, []);
  const pct = sec / total;
  const R = 30, C = 2 * Math.PI * R;
  const color = pct > 0.5 ? '#26de81' : pct > 0.2 ? '#f59e0b' : '#ff4757';
  const mm = Math.floor(sec/60).toString().padStart(2,'0');
  const ss = (sec%60).toString().padStart(2,'0');
  return (
    <div className="sig-ring-wrap">
      <div style={{position:'relative',width:72,height:72}}>
        <svg width="72" height="72" style={{transform:'rotate(-90deg)'}}>
          <circle cx="36" cy="36" r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="4"/>
          <circle cx="36" cy="36" r={R} fill="none" stroke={color} strokeWidth="4"
            strokeDasharray={`${pct*C} ${C}`} strokeLinecap="round"
            style={{transition:'stroke-dasharray 0.9s linear, stroke 0.4s ease'}}/>
        </svg>
        <div style={{
          position:'absolute',inset:0,display:'flex',flexDirection:'column',
          alignItems:'center',justifyContent:'center',gap:0,
        }}>
          <span style={{fontSize:13,fontWeight:800,color,fontVariantNumeric:'tabular-nums',lineHeight:1.1}}>{mm}:{ss}</span>
        </div>
      </div>
      <span className="sig-ring-lbl">{t.timerLabel}</span>
    </div>
  );
}

  // Live price ticker state
  const [price, setPrice]     = useState(() => BASE_PRICES[pair] ?? 1.0);
  const [sparkData, setSparkData] = useState(() => {
    const base = BASE_PRICES['GBP/USD OTC'];
    const vol  = getVolatility('GBP/USD OTC');
    const arr = []; let p = base;
    for (let i = 0; i < 60; i++) { p += (Math.random()-0.49)*base*vol; arr.push(p); }
    return arr;
  });

  const cdMap   = useRef({});
  const priceRef = useRef(BASE_PRICES[pair] ?? 1.0);
  const t = T[lang];

  // Init price & sparkline when pair changes
  useEffect(() => {
    const base = BASE_PRICES[pair] ?? 1.0;
    priceRef.current = base;
    setPrice(base);
    const vol = getVolatility(pair);
    const arr = []; let p = base;
    for (let i = 0; i < 60; i++) { p += (Math.random()-0.49)*base*vol; arr.push(p); }
    setSparkData(arr);
  }, [pair]);

  // Price tick every 900ms
  useEffect(() => {
    const vol  = getVolatility(pair);
    const base = BASE_PRICES[pair] ?? 1.0;
    const id   = setInterval(() => {
      priceRef.current += (Math.random()-0.49)*base*vol*0.6;
      setPrice(priceRef.current);
      setSparkData(prev => [...prev.slice(-59), priceRef.current]);
    }, 900);
    return () => clearInterval(id);
  }, [pair]);

  // Cooldown tick
  useEffect(() => {
    if (!cdEnd) return;
    const id = setInterval(() => {
      const rem = Math.ceil((cdEnd - Date.now()) / 1000);
      if (rem <= 0) { setCdEnd(null); setCdSec(0); } else setCdSec(rem);
    }, 500);
    return () => clearInterval(id);
  }, [cdEnd]);

  // Analysis: load indicators
  useEffect(() => {
    if (phase !== 'analyzing') return;
    if (loaded >= inds.length && inds.length > 0) {
      const id = setTimeout(() => setPhase('signal'), 600);
      return () => clearTimeout(id);
    }
    const id = setInterval(() => setLoaded(p => p + 1), 380);
    return () => clearInterval(id);
  }, [phase, loaded, inds.length]);

  // Counter animation
  useEffect(() => {
    if (phase !== 'analyzing') return;
    const target = parseFloat(acc);
    const steps  = 60; let cur = 0; const inc = target / steps;
    const id = setInterval(() => {
      cur = Math.min(cur + inc, target); setCountVal(cur.toFixed(1));
      if (cur >= target) clearInterval(id);
    }, (inds.length * 380 + 400) / steps);
    return () => clearInterval(id);
  }, [phase]);

  const handleGenerate = useCallback(() => {
    const a   = (85 + Math.random()*10).toFixed(1);
    const buy = Math.random() > 0.5;
    setIsBuy(buy); setAcc(a);
    setPayout(Math.floor(78 + Math.random()*15));
    setInds(makeIndicators(buy, a));
    setLoaded(0); setCountVal('0.0'); setPhase('analyzing');
    const end = Date.now() + tfMs;
    setCdEnd(end); cdMap.current[pair] = end;
  }, [pair, tfMs]);

  const handlePair = (p) => {
    setPair(p); setPhase('idle');
    const saved = cdMap.current[p];
    if (saved && saved > Date.now()) setCdEnd(saved);
    else { setCdEnd(null); setCdSec(0); }
  };

  const handleToggleFav = (p) => {
    setFavs(prev => {
      const next = prev.includes(p) ? prev.filter(x=>x!==p) : [...prev, p];
      try { localStorage.setItem('sp_favs', JSON.stringify(next)); } catch {}
      return next;
    });
  };

  const base       = BASE_PRICES[pair] ?? 1.0;
  const dec        = getDecimals(pair);
  const priceFmt   = price.toFixed(dec);
  const changePct  = ((price - base) / base * 100);
  const changeStr  = (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%';
  const isUp       = changePct >= 0;
  const sparkColor = isUp ? '#26de81' : '#ff4757';

  const onCd        = cdEnd && cdEnd > Date.now();
  const btnDisabled = phase === 'analyzing' || onCd;
  const btnText     = onCd ? `${t.getSignal} (${cdSec}s)` : t.getSignal;

  return (
    <>
      {/* Header */}
      <header className="hdr">

        <div className="hdr-ticker">
          <div className="ticker-left">
            <PairIcon pair={pair} size={20}/>
            <span className="ticker-pair">{pair}</span>
          </div>
          <div className="ticker-dot" style={{background: isUp ? 'var(--green)' : 'var(--red)'}}/>
        </div>
      </header>

      {/* Sparkline */}
      <div className="spark-strip">
        <Sparkline data={sparkData} isUp={isUp}/>
      </div>

      {/* Main */}
      <div className="main">
        {phase === 'idle'      && <IdleView t={t}/>}
        {phase === 'analyzing' && <AnalysisView t={t} indicators={inds} loaded={loaded} countVal={countVal}/>}
        {phase === 'signal'    && <SignalView t={t} isBuy={isBuy} accuracy={acc} pair={pair} tfMs={tfMs} payout={payout} onReset={() => setPhase('idle')}/>}
      </div>

      {/* Controls */}
      <div className="controls">
        <PairSelector pair={pair} onChange={handlePair} favs={favs} onToggleFav={handleToggleFav} t={t}/>

        <div className="tf-row">
          {TFS.map(tf => (
            <button key={tf.ms} className={`tf-btn${tfMs===tf.ms?' active':''}`} onClick={() => setTfMs(tf.ms)}>
              {tf.label}
            </button>
          ))}
        </div>

        <button className="gen-btn" disabled={btnDisabled} onClick={handleGenerate}>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          {btnText}
        </button>

        <div className="lang-row">
          {['ru','en','uz'].map(l => (
            <button key={l} className={`lang-btn${lang===l?' active':''}`} onClick={() => setLang(l)}>
              {l.toUpperCase()}
            </button>
          ))}
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
